name: viceregistry

services:
  app:
    build: .
    ports:
      - "4321:4321"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://viceregistry:secret@db:5432/viceregistry
      REGISTRY_URL: http://registry:5000
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      S3_BUCKET: viceregistry-blobs
    depends_on:
      db:
        condition: service_healthy
      registry:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: viceregistry
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: viceregistry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viceregistry"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  registry:
    image: registry:2
    ports:
      - "5000:5000"
    environment:
      REGISTRY_AUTH: token
      REGISTRY_AUTH_TOKEN_REALM: ${REGISTRY_AUTH_TOKEN_REALM:-${PUBLIC_URL}/api/auth/token}
      REGISTRY_AUTH_TOKEN_SERVICE: registry.local
      REGISTRY_AUTH_TOKEN_ISSUER: viceregistry
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /certs/token.crt
      REGISTRY_TOKEN_PUBLIC_KEY_FILE: /certs/token.crt
      REGISTRY_STORAGE: s3
      REGISTRY_STORAGE_S3_ACCESSKEY: minioadmin
      REGISTRY_STORAGE_S3_SECRETKEY: minioadmin
      REGISTRY_STORAGE_S3_BUCKET: viceregistry-blobs
      REGISTRY_STORAGE_S3_REGION: us-east-1
      REGISTRY_STORAGE_S3_REGIONENDPOINT: http://minio:9000
      REGISTRY_STORAGE_S3_FORCEPATHSTYLE: "true"
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_LOG_LEVEL: ${REGISTRY_LOG_LEVEL:-info}
    volumes:
      - ./keys/registry-token.crt:/certs/token.crt:ro
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: create the S3 bucket in MinIO on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/viceregistry-blobs &&
        mc anonymous set none local/viceregistry-blobs
      "
    restart: "no"

volumes:
  pgdata:
  miniodata: