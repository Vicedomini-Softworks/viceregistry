# Production overrides for AWS S3 (instead of MinIO)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
name: viceregistry

services:
  app:
    environment:
      S3_ENDPOINT_URL: "" # use native AWS endpoints
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}

  registry:
    environment:
      REGISTRY_STORAGE_S3_ACCESSKEY: ${AWS_ACCESS_KEY_ID}
      REGISTRY_STORAGE_S3_SECRETKEY: ${AWS_SECRET_ACCESS_KEY}
      REGISTRY_STORAGE_S3_BUCKET: ${S3_BUCKET}
      REGISTRY_STORAGE_S3_REGION: ${AWS_REGION}
      REGISTRY_STORAGE_S3_REGIONENDPOINT: "" # use native AWS endpoints
      REGISTRY_STORAGE_S3_FORCEPATHSTYLE: "false"

  # Disable MinIO in production
  minio:
    profiles: ["disabled"]
  minio-init:
    profiles: ["disabled"]
